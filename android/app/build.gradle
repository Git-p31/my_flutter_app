plugins {
    id 'com.android.application'
    id 'kotlin-android'
    // Flutter Gradle Plugin должен быть подключен после плагинов Android и Kotlin.
    id 'dev.flutter.flutter-gradle-plugin'
}

android {
    namespace = "com.example.my_flutter_app" // Убедитесь, что здесь указан правильный пакет приложения
    compileSdk = 33 // Укажите актуальную версию SDK

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = "1.8"
    }

    defaultConfig {
        applicationId "com.example.my_flutter_app" // Укажите уникальный applicationId для вашего приложения
        minSdkVersion 21 // Минимальная поддерживаемая версия Android
        targetSdkVersion 33 // Текущая версия SDK
        versionCode 1 // Увеличивайте это значение при каждом обновлении
        versionName "1.0" // Текущая версия вашего приложения
    }

    buildTypes {
        release {
            // Отключите подпись APK, если не настроена
            // signingConfig signingConfigs.release

            minifyEnabled false
            shrinkResources false
        }
    }
}

flutter {
    source = "../.." // Указывает путь к проекту Flutter
}
