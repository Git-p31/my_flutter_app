plugins {
    id 'com.android.application'
    id 'kotlin-android'
    // Flutter Gradle Plugin підключається після Android та Kotlin плагінів
    id 'dev.flutter.flutter-gradle-plugin'
}

android {
    namespace "com.example.Kemo_app" // Вкажіть своє ім'я пакету
    compileSdkVersion 33

    defaultConfig {
        applicationId "com.example.Kemo_app"
        minSdkVersion 21
        targetSdkVersion 33
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        release {
            // Якщо не налаштована підпис, приберіть рядок signingConfig
            // signingConfig signingConfigs.release

            // Вимкнено стиснення ресурсів та мінімізація коду
            minifyEnabled false
            shrinkResources false
        }
        debug {
            // Білд для debug-режиму
            debuggable true
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = "1.8"
    }
}
flutter {
    source = "E:/Kemo-app/my_flutter_app" // Вкажіть правильний шлях до вашого Flutter-проєкту, якщо потрібно
}
